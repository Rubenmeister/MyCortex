substitutions:
  _REGION: us-east1
  _JOB: gmail-sync
  _REPO: mycortex
  _SUPABASE_URL: 'https://ifsdhwihdjrogebsutem.supabase.co'

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --file=workers/gmail-sync/Dockerfile
      - --tag=us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:$BUILD_ID
      - --tag=us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: bash
    args:
      - -c
      - |
        if gcloud run jobs describe ${_JOB} --region=${_REGION} --project=$PROJECT_ID >/dev/null 2>&1; then
          gcloud run jobs update ${_JOB} \
            --image=us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:$BUILD_ID \
            --region=${_REGION} \
            --task-timeout=900s \
            --memory=1Gi \
            --cpu=1 \
            --max-retries=1 \
            --service-account=mycortex-cron-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars="SUPABASE_URL=${_SUPABASE_URL}" \
            --set-secrets="SUPABASE_SERVICE_ROLE_KEY=mycortex-supabase-service:latest,OPENAI_API_KEY=mycortex-openai:latest,GOOGLE_OAUTH_CLIENT_ID=mycortex-google-oauth-client-id:latest,GOOGLE_OAUTH_CLIENT_SECRET=mycortex-google-oauth-client-secret:latest"
        else
          gcloud run jobs create ${_JOB} \
            --image=us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:$BUILD_ID \
            --region=${_REGION} \
            --task-timeout=900s \
            --memory=1Gi \
            --cpu=1 \
            --max-retries=1 \
            --service-account=mycortex-cron-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars="SUPABASE_URL=${_SUPABASE_URL}" \
            --set-secrets="SUPABASE_SERVICE_ROLE_KEY=mycortex-supabase-service:latest,OPENAI_API_KEY=mycortex-openai:latest,GOOGLE_OAUTH_CLIENT_ID=mycortex-google-oauth-client-id:latest,GOOGLE_OAUTH_CLIENT_SECRET=mycortex-google-oauth-client-secret:latest"
        fi

images:
  - us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:$BUILD_ID
  - us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
