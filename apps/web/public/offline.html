<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión — MyCortex</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        background: #0a0a0f;
        color: #e6e6e6;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 360px; }
      .emoji { font-size: 44px; margin-bottom: 16px; }
      h1 { font-size: 20px; margin: 0 0 10px; }
      p { color: #999; font-size: 14px; line-height: 1.55; margin: 0 0 20px; }
      button {
        background: #fff; color: #000; border: none; border-radius: 10px;
        padding: 11px 22px; font-size: 14px; font-weight: 700; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="emoji">🧠</div>
      <h1>Sin conexión</h1>
      <p>
        MyCortex necesita internet para razonar sobre tu segundo cerebro. Revisa tu conexión y vuelve
        a intentar.
      </p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
