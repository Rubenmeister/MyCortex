# Cloud Build pipeline for the MyCortex api.
#
# Trigger from local:
#   gcloud builds submit . \
#     --config=apps/api/cloudbuild.yaml \
#     --project=$PROJECT_ID \
#     --substitutions=_REGION=us-east1,_SERVICE=mycortex-api
#
# Or hook to a GitHub trigger that runs on push to `main`.
#
# Secrets are NOT baked into the image — the Cloud Run service is configured
# to mount Secret Manager refs at runtime. Set them with:
#   gcloud run services update $SERVICE --region=$REGION \
#     --update-secrets=OPENAI_API_KEY=mycortex-openai:latest,\
#                      ANTHROPIC_API_KEY=mycortex-anthropic:latest,\
#                      SUPABASE_SERVICE_ROLE_KEY=mycortex-supabase-service:latest \
#     --update-env-vars=SUPABASE_URL=...,SUPABASE_ANON_KEY=...

substitutions:
  _REGION: us-east1
  _SERVICE: mycortex-api
  _REPO: mycortex
  # min=1 because MyCortex is positioned as B2B + personal — cold starts
  # of 2-3s on the first request after idle break enterprise UX. The added
  # ~$8/mes for always-on is trivial vs the perceived quality difference.
  # If you ever need to slash costs for purely-personal usage, drop to 0.
  _MIN_INSTANCES: '1'
  _MAX_INSTANCES: '10'
  # Non-secret env. Pass via --substitutions on submit if they ever change.
  _SUPABASE_URL: 'https://ifsdhwihdjrogebsutem.supabase.co'
  _SUPABASE_ANON_KEY: 'sb_publishable_LbMt0RlbJfDcgTZSF49Wsg_WKvFSd6K'

steps:
  # 1. Build the image
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --file=apps/api/Dockerfile
      - --tag=us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID
      - --tag=us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  # 2. Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

  # 3. Deploy to Cloud Run.
  #    Env vars + secrets are applied in this single step so the very first
  #    revision can boot (the api's Zod env validator exits if SUPABASE_*
  #    are missing). Subsequent deploys preserve env unless the flags change.
  #    --no-traffic on subsequent deploys would let us canary; for v1 we go
  #    straight to traffic. Switch later when we add canary/rollback workflows.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=${_MIN_INSTANCES}
      - --max-instances=${_MAX_INSTANCES}
      - --concurrency=80
      - --timeout=60s
      - --service-account=mycortex-api-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=NODE_ENV=production,LOG_LEVEL=info,SUPABASE_URL=${_SUPABASE_URL},SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY}
      - --set-secrets=OPENAI_API_KEY=mycortex-openai:latest,ANTHROPIC_API_KEY=mycortex-anthropic:latest,SUPABASE_SERVICE_ROLE_KEY=mycortex-supabase-service:latest,TAVILY_API_KEY=mycortex-tavily:latest

images:
  - us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID
  - us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
