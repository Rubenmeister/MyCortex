# Cloud Build pipeline for the MyCortex api.
#
# Trigger from local:
#   gcloud builds submit . \
#     --config=apps/api/cloudbuild.yaml \
#     --project=$PROJECT_ID \
#     --substitutions=_REGION=us-east1,_SERVICE=mycortex-api
#
# Or hook to a GitHub trigger that runs on push to `main`.
#
# Secrets are NOT baked into the image — the Cloud Run service is configured
# to mount Secret Manager refs at runtime. Set them with:
#   gcloud run services update $SERVICE --region=$REGION \
#     --update-secrets=OPENAI_API_KEY=mycortex-openai:latest,\
#                      ANTHROPIC_API_KEY=mycortex-anthropic:latest,\
#                      SUPABASE_SERVICE_ROLE_KEY=mycortex-supabase-service:latest \
#     --update-env-vars=SUPABASE_URL=...,SUPABASE_ANON_KEY=...

substitutions:
  _REGION: us-east1
  _SERVICE: mycortex-api
  _REPO: mycortex
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '5'

steps:
  # 1. Build the image
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --file=apps/api/Dockerfile
      - --tag=us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA
      - --tag=us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  # 2. Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

  # 3. Deploy to Cloud Run.
  #    --no-traffic on subsequent deploys would let us canary; for v1 we go
  #    straight to traffic. Switch later when we add canary/rollback workflows.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=${_MIN_INSTANCES}
      - --max-instances=${_MAX_INSTANCES}
      - --concurrency=80
      - --timeout=60s
      - --service-account=mycortex-api-sa@$PROJECT_ID.iam.gserviceaccount.com

images:
  - us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA
  - us-east1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
